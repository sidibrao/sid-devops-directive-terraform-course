name: Terraform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  TF_VERSION: 1.5.0

jobs:
  terraform:
    name: Terraform Plan and Apply
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Step 1 - Download repo code onto GitHub runner
        uses: actions/checkout@v3

      - name: Step 2 - Authenticate to AWS using OIDC role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformSession
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Step 3 - Verify AWS connection is working
        run: aws sts get-caller-identity

      - name: Step 4 - Install Terraform on the runner
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Step 5 - Initialize aws-backend
        working-directory: ./03-basics/aws-backend
        run: terraform init -backend-config=../backend.hcl

      - name: Step 6 - Plan aws-backend
        working-directory: ./03-basics/aws-backend
        run: terraform plan -no-color
        continue-on-error: true

      - name: Step 7 - Apply aws-backend on main only
        working-directory: ./03-basics/aws-backend
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve

      - name: Step 8 - Initialize web-app
        working-directory: ./03-basics/web-app
        run: terraform init -backend-config=../backend.hcl

      - name: Step 9 - Plan web-app
        working-directory: ./03-basics/web-app
        run: terraform plan -no-color
        continue-on-error: true

      - name: Step 10 - Apply web-app on main only
        working-directory: ./03-basics/web-app
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
